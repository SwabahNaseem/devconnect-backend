spring.application.name=DevConnect

# ─── DATABASE ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-holy-lab-anj9ofow.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_w7veCM9VcrzX}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── FILE UPLOAD ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=uploads/

# ─── JWT ────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:devconnect_super_secret_key_2024}
app.jwt.expiration=604800000

# ─── SERVER ─────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── EMAIL ──────────────────────────────────────────────────
# Disable mail auto-config if credentials not provided
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true